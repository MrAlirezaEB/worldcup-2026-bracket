services:
  backend:
    build:
      context: ./backend
    container_name: worldcup-backend
    restart: always
    volumes:
      - ./backend/db.json:/app/db.json
    environment:
      - PORT=5000

  frontend:
    build:
      context: ./frontend
    container_name: worldcup-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
